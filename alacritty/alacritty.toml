# -----------------------------------------------------------------------------
# Window
# -----------------------------------------------------------------------------
[window]
padding = { x = 2, y = 2 }

# -----------------------------------------------------------------------------
# Font
# -----------------------------------------------------------------------------

# Sizing
[font]
size = 14.0

# Positioning
[font.glyph_offset]
x = 0
y = 0
[font.offset]
x = 0
y = 0

# Styles
[font.normal]
family = "Hack Nerd Font Mono"
style = "Regular"

[font.bold]
family = "Hack Nerd Font Mono"
style = "Bold"

[font.italic]
family = "Hack Nerd Font Mono"
style = "Italic"

[font.bold_italic]
family = "Hack Nerd Font Mono"
style = "Bold Italic"

# -----------------------------------------------------------------------------
# Gruvbox Material
# -----------------------------------------------------------------------------

# Main colors
[colors.primary]
# hard bg = '#1d2021'
# soft bg = = '#32302f'
background = '#282828'
foreground = '#ebdbb2'

# Normal colors
[colors.normal]
black   = '#282828'
red     = '#cc241d'
green   = '#98971a'
yellow  = '#d79921'
blue    = '#458588'
magenta = '#b16286'
cyan    = '#689d6a'
white   = '#a89984'

# Bright colors
[colors.bright]
black   = '#928374'
red     = '#fb4934'
green   = '#b8bb26'
yellow  = '#fabd2f'
blue    = '#83a598'
magenta = '#d3869b'
cyan    = '#8ec07c'
white   = '#ebdbb2'
